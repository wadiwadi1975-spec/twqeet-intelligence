<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#B8960C"/>
    </linearGradient>
    <linearGradient id="goldGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A07C1C"/>
    </linearGradient>
    <linearGradient id="diamondLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5D6"/>
      <stop offset="30%" stop-color="#F5D060"/>
      <stop offset="60%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8960C"/>
    </linearGradient>
    <linearGradient id="diamondDark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- Incomplete circle -->
  <path d="M 275,150 A 95,95 0 1,1 150,55" fill="none" stroke="url(#goldGrad)" stroke-width="7" stroke-linecap="round"/>

  <!-- Bar chart -->
  <rect x="100" y="92" width="18" height="38" rx="2" fill="url(#goldGradV)"/>
  <rect x="123" y="72" width="18" height="58" rx="2" fill="url(#goldGradV)"/>
  <rect x="146" y="55" width="18" height="75" rx="2" fill="url(#goldGradV)"/>
  <rect x="169" y="42" width="18" height="88" rx="2" fill="url(#goldGradV)"/>

  <!-- Upward arrow -->
  <path d="M 98,128 L 195,38" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <polygon points="195,38 185,30 195,20 205,32" fill="url(#goldGrad)"/>

  <!-- Diamond top face -->
  <polygon points="175,165 245,200 175,245 105,200" fill="url(#diamondLight)"/>

  <!-- Diamond highlight -->
  <polygon points="175,165 205,182 175,195 145,182" fill="#FFF5D6" opacity="0.4"/>

  <!-- Diamond left shadow -->
  <polygon points="175,165 105,200 145,182" fill="url(#diamondDark)" opacity="0.5"/>

  <!-- Diamond right shadow -->
  <polygon points="175,165 245,200 205,182" fill="#C9A227" opacity="0.4"/>

  <!-- Diamond bottom left -->
  <polygon points="105,200 175,245 175,195" fill="#8B6914" opacity="0.45"/>

  <!-- Diamond bottom right -->
  <polygon points="245,200 175,245 175,195" fill="#A07C1C" opacity="0.4"/>

  <!-- Diamond center line -->
  <line x1="175" y1="165" x2="175" y2="245" stroke="#FFF5D6" stroke-width="0.8" opacity="0.2"/>
</svg>
